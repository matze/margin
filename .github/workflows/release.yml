name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to build (must already exist)
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Fail fast if the tag and Cargo.toml version disagree.
      - name: Verify tag matches Cargo.toml
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          tag="${tag#v}"
          crate="$(cargo metadata --no-deps --format-version=1 \
            | jq -r '.packages[] | select(.name=="margin") | .version')"
          test "$tag" = "$crate" || { echo "tag $tag != Cargo.toml $crate"; exit 1; }
      # Release body = the section of CHANGELOG.md matching the tag version.
      - uses: taiki-e/create-gh-release-action@v1
        with:
          changelog: CHANGELOG.md
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (glibc)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          # Linux (musl, statically linked)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          # macOS
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: margin
          target: ${{ matrix.target }}
          archive: $bin-$tag-$target
          tar: unix
          zip: windows
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
